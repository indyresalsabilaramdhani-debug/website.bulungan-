<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Wisata Bulungan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(90deg, #1e3a5f, #2c4f7c);
    padding:12px 25px;
    flex-wrap:wrap;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
    color:#c6a75e;
    font-size:20px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:12px;
    list-style:none;
    flex-wrap:wrap;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:13px;
    padding:6px 10px;
    border-radius:5px;
    transition:0.3s;
}

.menu a:hover{
    background:#c6a75e;
    color:#1e3a5f;
}

.menu a.active{
    background:#c6a75e;
    color:#1e3a5f;
}

/* HERO */
.hero{
    height:50vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://image2url.com/r2/default/images/1775299148224-2174194e-8d47-45f4-97a8-031624040ec1.webp');

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-size:40px;
    animation:fadeIn 1s ease;
}

/* ANIMASI */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:50px 20px;
}

/* FORM */
.form-box{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);

    animation:fadeIn 1s ease;
}

.form-box h2{
    margin-bottom:20px;
    color:#1e3a5f;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#c6a75e;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#a88d4d;
}

/* MAP */
.map{
    margin-top:40px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

iframe{
    width:100%;
    height:300px;
    border:0;
}

/* FOOTER */
footer{
    background:#1e3a5f;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">Explore Bulungan</h2>

    <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="tentang.html">Tentang</a></li>
        <li><a href="destinasi-alam.html">Destinasi Alam</a></li>
        <li><a href="destinasi-budaya.html">Destinasi Budaya</a></li>
        <li><a href="aktivitas.html">Aktivitas</a></li>
        <li><a href="kuliner.html">Kuliner</a></li>
        <li><a href="akomodasi.html">Akomodasi</a></li>
        <li><a href="transportasi.html">Transportasi</a></li>
        <li><a href="galeri.html">Galeri</a></li>
        <li><a href="booking.html" class="active">Booking</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Booking Wisata</h1>
</section>

<!-- FORM -->
<div class="container">

    <div class="form-box">
        <h2>Form Pemesanan</h2>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Masukkan email">
        </div>

        <div class="form-group">
            <label>Pilih Destinasi</label>
            <select>
                <option>Sungai Kayan</option>
                <option>Gunung Putih</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tanggal Kunjungan</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Pesan Tambahan</label>
            <textarea rows="3"></textarea>
        </div>

        <button>Pesan Sekarang</button>
    </div>

    <!-- PETA (OPSIONAL TAPI NYAMBUNG) -->
    <div class="map">
        <iframe src="https://maps.google.com/maps?q=Bulungan&t=&z=10&ie=UTF8&iwloc=&output=embed"></iframe>
    </div>

</div>

<footer>
    <p>©️ 2026 Explore Bulungan Tourism Website</p>
</footer>

</body>
</html>
