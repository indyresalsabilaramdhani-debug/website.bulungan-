<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Bulungan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(90deg, #1e3a5f, #2c4f7c);
    padding:12px 25px;
    flex-wrap:wrap;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
    color:#c6a75e;
    font-size:20px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:12px;
    list-style:none;
    flex-wrap:wrap;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:13px;
    padding:6px 10px;
    border-radius:5px;
    transition:0.3s;
}

.menu a:hover{
    background:#c6a75e;
    color:#1e3a5f;
}

.menu a.active{
    background:#c6a75e;
    color:#1e3a5f;
}

/* HERO */
.hero{
    height:50vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://image2url.com/r2/default/images/1775299148224-2174194e-8d47-45f4-97a8-031624040ec1.webp');

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-size:40px;
    animation:fadeIn 1s ease;
}

/* ANIMASI */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes zoomIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:50px 20px;
}

/* GALERI 2 FOTO */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
    gap:20px;
}

/* ITEM */
.gallery img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:12px;
    animation:zoomIn 0.8s ease;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* FOOTER */
footer{
    background:#1e3a5f;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">Explore Bulungan</h2>

    <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="tentang.html">Tentang</a></li>
        <li><a href="destinasi-alam.html">Destinasi Alam</a></li>
        <li><a href="destinasi-budaya.html">Destinasi Budaya</a></li>
        <li><a href="aktivitas.html">Aktivitas</a></li>
        <li><a href="kuliner.html">Kuliner</a></li>
        <li><a href="akomodasi.html">Akomodasi</a></li>
        <li><a href="transportasi.html">Transportasi</a></li>
        <li><a href="galeri.html" class="active">Galeri</a></li>
        <li><a href="booking.html">Booking</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Galeri Bulungan</h1>
</section>

<!-- GALERI -->
<div class="container">

    <div class="gallery">

        <img src="https://image2url.com/r2/default/images/1775301887484-71b66736-eced-4d16-8848-2eeba5d7afb4.jpeg">
        <img src="https://image2url.com/r2/default/images/1775301943574-ad6cf49c-ccc6-43d8-be10-982652ca277b.jpeg">

    </div>

</div>

<footer>
    <p>©️ 2026 Explore Bulungan Tourism Website</p>
</footer>

</body>
</html>
